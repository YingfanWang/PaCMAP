name: Tests

on:
  push:
    branches: [ main , master]
  pull_request:
    branches: [ main , master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"] # Skip 3.13 for now

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-${{ matrix.python-version }}-
          ${{ runner.os }}-uv-

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-test.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Cache datasets
      uses: actions/cache@v4
      with:
        path: ~/scikit_learn_data
        key: ${{ runner.os }}-datasets-${{ hashFiles('test/fixtures/datasets.json') }}
        restore-keys: |
          ${{ runner.os }}-datasets-

    - name: Install dependencies
      run: make install-dev

    - name: Run tests
      run: make test

  test-python313:
    name: Test Python 3.13 (without UV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install with pip
        run: |
          python -m pip install -e ".[all-git]"
      - name: Run tests
        run: pytest test/